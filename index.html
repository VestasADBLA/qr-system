<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR-to-Table Configuration</title>

<style>
:root{
  --bg:#f4f6f8;
  --card:#fff;
  --text:#182230;
  --muted:#667085;
  --line:#d0d5dd;
  --blue:#175cd3;
  --blue2:#1849a9;
  --red:#b42318;
  --green:#067647;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  line-height:1.45;
}

.container{
  width:min(1100px,calc(100% - 28px));
  margin:30px auto 60px;
}

h1,h2,h3{margin-top:0}

h1{
  margin-bottom:5px;
  font-size:clamp(25px,4vw,36px);
}

.subtitle{
  margin:0 0 22px;
  color:var(--muted);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:22px;
  margin-bottom:22px;
  box-shadow:0 2px 8px rgba(16,24,40,.05);
}

.form-grid{
  display:grid;
  grid-template-columns:220px 1fr;
}

.form-row{
  display:contents;
}

.form-row label,
.form-row .field{
  padding:10px 12px;
  border-bottom:1px solid #eaecf0;
}

.form-row label{
  display:flex;
  align-items:center;
  font-weight:700;
  background:#f9fafb;
}

input{
  width:100%;
  min-height:42px;
  padding:9px 11px;
  border:1px solid #98a2b3;
  border-radius:7px;
  font:inherit;
}

input:focus{
  outline:3px solid rgba(23,92,211,.15);
  border-color:var(--blue);
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:20px;
}

button,
.btn{
  border:0;
  border-radius:8px;
  min-height:43px;
  padding:10px 17px;
  cursor:pointer;
  font:inherit;
  font-weight:700;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.primary{
  background:var(--blue);
  color:#fff;
}

.primary:hover{
  background:var(--blue2);
}

.secondary{
  background:#eaecf0;
  color:#344054;
}

.status{
  min-height:22px;
  margin:12px 0 0;
  font-weight:700;
}

.success{color:var(--green)}
.error{color:var(--red)}

.history-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

.history-item{
  margin-top:20px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
}

.history-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.history-title h3{
  margin:0;
}

.badge{
  background:#eff8ff;
  color:#175cd3;
  padding:4px 9px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.qr-layout{
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:22px;
  align-items:start;
}

.qr-box{
  background:white;
  border:1px solid #d0d5dd;
  padding:12px;
  border-radius:8px;
  line-height:0;
}

canvas{
  display:block;
  max-width:100%;
  height:auto;
  image-rendering:pixelated;
}

.url-box{
  padding:11px;
  border:1px solid var(--line);
  background:#f9fafb;
  border-radius:7px;
  font-family:monospace;
  font-size:12px;
  overflow-wrap:anywhere;
}

.muted{
  color:var(--muted);
  font-size:13px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid var(--line);
  padding:11px 13px;
  text-align:left;
}

th{
  background:#f9fafb;
}

.table-wrap{
  overflow-x:auto;
}

.channel-section{
  margin-top:24px;
}

.hidden{
  display:none!important;
}

.empty{
  color:var(--muted);
}

.error-panel{
  background:#fef3f2;
  color:#912018;
  border-left:4px solid var(--red);
  border-radius:6px;
  padding:15px;
}

@media(max-width:700px){

  .container{
    width:calc(100% - 18px);
    margin-top:14px;
  }

  .card{
    padding:15px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .form-row{
    display:block;
    padding:9px 0;
    border-bottom:1px solid #eaecf0;
  }

  .form-row label,
  .form-row .field{
    display:block;
    padding:3px 0;
    border:0;
    background:none;
  }

  .form-row label{
    margin-bottom:5px;
  }

  .qr-layout{
    grid-template-columns:1fr;
  }

  .qr-box{
    width:max-content;
    max-width:100%;
    margin:auto;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- =====================================================
     INSTALLER VIEW
===================================================== -->

<main id="installerView" class="hidden">

<header>
  <h1>QR-to-Table Configuration</h1>
  <p class="subtitle">Installer View</p>
</header>

<section class="card">

<h2>Configuration Input</h2>

<form id="configForm" autocomplete="off">

<div class="form-grid" id="formGrid">

<div class="form-row">
<label for="specimenId">Specimen ID</label>
<div class="field">
<input id="specimenId" required maxlength="100">
</div>
</div>

<div class="form-row">
<label for="gtrsNumber">GTRS Number</label>
<div class="field">
<input id="gtrsNumber" maxlength="100">
</div>
</div>

<div class="form-row">
<label for="installerName">Installer Name</label>
<div class="field">
<input id="installerName" maxlength="100">
</div>
</div>

</div>

<div class="actions">
<button class="primary" type="submit">Generate QR Code</button>
</div>

<p id="status" class="status"></p>

</form>
</section>


<section class="card">

<div class="history-header">

<div>
<h2 style="margin-bottom:4px">Batch History Log</h2>
<div class="muted">
Generated QR codes remain available while this page is open.
</div>
</div>

<button id="clearHistory"
        class="secondary hidden"
        type="button">
Clear Session Log
</button>

</div>

<p id="historyEmpty" class="empty">
No QR codes generated in this session.
</p>

<div id="history"></div>

</section>

</main>



<!-- =====================================================
     END USER VIEW
===================================================== -->

<main id="userView" class="hidden">

<header>
<h1>Specimen Configuration</h1>
<p class="subtitle">Read-Only Configuration</p>
</header>

<section id="userCard" class="card"></section>

</main>

</div>


<script>
/* ============================================================
   SELF-CONTAINED QR CODE GENERATOR
   QR Code Model 2
   Byte mode
   Error correction level L
   Versions 1-10

   No CDN
   No external scripts
   No API calls
============================================================ */

const QR=(()=>{

const RS=[
null,
[[1,26,19]],
[[1,44,34]],
[[1,70,55]],
[[1,100,80]],
[[1,134,108]],
[[2,86,68]],
[[2,98,78]],
[[2,121,97]],
[[2,146,116]],
[[2,86,68],[2,87,69]]
];

const POS=[
null,
[],
[6,18],
[6,22],
[6,26],
[6,30],
[6,34],
[6,22,38],
[6,24,42],
[6,26,46],
[6,28,50]
];

const EXP=new Array(512);
const LOG=new Array(256);

let x=1;

for(let i=0;i<255;i++){
  EXP[i]=x;
  LOG[x]=i;
  x<<=1;
  if(x&0x100)x^=0x11d;
}

for(let i=255;i<512;i++)
  EXP[i]=EXP[i-255];


function gm(a,b){
  if(a===0||b===0)return 0;
  return EXP[LOG[a]+LOG[b]];
}


function polyMul(a,b){

  const r=
  new Array(a.length+b.length-1).fill(0);

  for(let i=0;i<a.length;i++)
    for(let j=0;j<b.length;j++)
      r[i+j]^=gm(a[i],b[j]);

  return r;
}


function generator(n){

  let g=[1];

  for(let i=0;i<n;i++)
    g=polyMul(g,[1,EXP[i]]);

  return g;
}


function makeECC(data,count){

  const gen=generator(count);

  const msg=[
    ...data,
    ...new Array(count).fill(0)
  ];

  for(let i=0;i<data.length;i++){

    const factor=msg[i];

    if(factor===0)
      continue;

    for(let j=0;j<gen.length;j++)
      msg[i+j]^=gm(gen[j],factor);
  }

  return msg.slice(data.length);
}


function blocks(version){

  const list=[];

  for(const b of RS[version])

    for(let i=0;i<b[0];i++)

      list.push({
        total:b[1],
        data:b[2]
      });

  return list;
}


function capacity(version){

  return blocks(version)
  .reduce((n,b)=>n+b.data,0);
}


function bitsPush(arr,value,count){

  for(let i=count-1;i>=0;i--)
    arr.push((value>>>i)&1);
}


function bytes(text){

  return Array.from(
    new TextEncoder().encode(text)
  );
}


function codewords(text,version){

  const input=bytes(text);

  const maxBytes=
    capacity(version);

  const bitArray=[];

  /* Byte mode */
  bitsPush(bitArray,4,4);

  /* Character count */
  bitsPush(
    bitArray,
    input.length,
    version<=9?8:16
  );

  for(const b of input)
    bitsPush(bitArray,b,8);


  const maxBits=maxBytes*8;

  if(bitArray.length>maxBits)
    throw Error(
      "QR data exceeds supported capacity."
    );


  /* Terminator */
  for(
    let i=0;
    i<4 &&
    bitArray.length<maxBits;
    i++
  )
    bitArray.push(0);


  /* Byte alignment */
  while(bitArray.length%8)
    bitArray.push(0);


  const data=[];

  for(
    let i=0;
    i<bitArray.length;
    i+=8
  ){

    let b=0;

    for(let j=0;j<8;j++)
      b=(b<<1)|bitArray[i+j];

    data.push(b);
  }


  let pad=true;

  while(data.length<maxBytes){

    data.push(
      pad?0xec:0x11
    );

    pad=!pad;
  }


  const specs=blocks(version);

  const db=[];
  const eb=[];

  let offset=0;
  let maxD=0;
  let maxE=0;


  for(const spec of specs){

    const d=
      data.slice(
        offset,
        offset+spec.data
      );

    offset+=spec.data;

    const e=
      makeECC(
        d,
        spec.total-spec.data
      );

    db.push(d);
    eb.push(e);

    maxD=Math.max(
      maxD,
      d.length
    );

    maxE=Math.max(
      maxE,
      e.length
    );
  }


  const out=[];


  /* Interleave data */
  for(let i=0;i<maxD;i++)

    for(const b of db)

      if(i<b.length)
        out.push(b[i]);


  /* Interleave ECC */
  for(let i=0;i<maxE;i++)

    for(const b of eb)

      if(i<b.length)
        out.push(b[i]);


  return out;
}


function bitLength(v){

  let n=0;

  while(v){
    n++;
    v>>>=1;
  }

  return n;
}


function BCHFormat(data){

  let d=data<<10;

  const g=0x537;

  while(
    bitLength(d)>=
    bitLength(g)
  )

    d^=
      g<<(
        bitLength(d)-
        bitLength(g)
      );

  return(
    ((data<<10)|d)
    ^0x5412
  );
}


function maskFunc(mask,r,c){

  switch(mask){

    case 0:
      return (r+c)%2===0;

    case 1:
      return r%2===0;

    case 2:
      return c%3===0;

    case 3:
      return (r+c)%3===0;

    case 4:
      return(
        Math.floor(r/2)+
        Math.floor(c/3)
      )%2===0;

    case 5:
      return(
        (r*c)%2+
        (r*c)%3
      )===0;

    case 6:
      return(
        (
          (r*c)%2+
          (r*c)%3
        )%2
      )===0;

    case 7:
      return(
        (
          (r*c)%3+
          (r+c)%2
        )%2
      )===0;
  }
}


function finder(m,row,col){

  const n=m.length;

  for(let r=-1;r<=7;r++)

    for(let c=-1;c<=7;c++){

      const y=row+r;
      const x=col+c;

      if(
        y<0||
        y>=n||
        x<0||
        x>=n
      )
        continue;

      m[y][x]=

        r>=0&&
        r<=6&&
        c>=0&&
        c<=6&&

        (
          r===0||
          r===6||
          c===0||
          c===6||

          (
            r>=2&&
            r<=4&&
            c>=2&&
            c<=4
          )
        );
    }
}


function alignment(m,r,c){

  for(let y=-2;y<=2;y++)

    for(let x=-2;x<=2;x++)

      m[r+y][c+x]=
        Math.max(
          Math.abs(y),
          Math.abs(x)
        )!==1;
}


function setup(version){

  const n=
    17+4*version;

  const m=
    Array.from(
      {length:n},
      ()=>
      Array(n).fill(null)
    );


  finder(m,0,0);

  finder(
    m,
    n-7,
    0
  );

  finder(
    m,
    0,
    n-7
  );


  /* Timing patterns */

  for(let i=8;i<n-8;i++){

    if(m[6][i]===null)
      m[6][i]=
        i%2===0;

    if(m[i][6]===null)
      m[i][6]=
        i%2===0;
  }


  /* Alignment patterns */

  for(const r of POS[version])

    for(const c of POS[version]){

      if(
        m[r][c]!==null
      )
        continue;

      alignment(m,r,c);
    }


  /* Format information reservation */

  for(let i=0;i<9;i++){

    if(m[i][8]===null)
      m[i][8]=false;

    if(m[8][i]===null)
      m[8][i]=false;
  }


  for(let i=n-8;i<n;i++){

    if(m[i][8]===null)
      m[i][8]=false;

    if(m[8][i]===null)
      m[8][i]=false;
  }


  /* Mandatory dark module */

  m[n-8][8]=true;


  return m;
}


function formatInfo(m,mask){

  /*
    Error correction L has format
    level value binary 01.
  */

  const data=
    (1<<3)|mask;

  const bits=
    BCHFormat(data);

  const n=m.length;


  for(let i=0;i<15;i++){

    const dark=
      ((bits>>i)&1)
      ===1;


    /* Vertical */

    if(i<6)

      m[i][8]=dark;

    else if(i<8)

      m[i+1][8]=dark;

    else

      m[
        n-15+i
      ][8]=dark;


    /* Horizontal */

    if(i<8)

      m[8][
        n-i-1
      ]=dark;

    else if(i===8)

      m[8][7]=dark;

    else

      m[8][
        14-i
      ]=dark;
  }


  m[n-8][8]=true;
}


function placeData(
  m,
  data,
  mask
){

  const n=m.length;

  let row=n-1;

  let direction=-1;

  let byteIndex=0;

  let bitIndex=7;


  for(
    let col=n-1;
    col>0;
    col-=2
  ){

    if(col===6)
      col--;


    while(true){


      for(let i=0;i<2;i++){

        const c=col-i;


        if(
          m[row][c]
          !==null
        )
          continue;


        let dark=false;


        if(
          byteIndex<
          data.length
        )

          dark=
            (
              (
                data[
                  byteIndex
                ]
                >>>bitIndex
              )&1
            )===1;


        if(
          maskFunc(
            mask,
            row,
            c
          )
        )

          dark=!dark;


        m[row][c]=dark;


        bitIndex--;


        if(bitIndex<0){

          byteIndex++;

          bitIndex=7;
        }
      }


      row+=direction;


      if(
        row<0||
        row>=n
      ){

        row-=direction;

        direction=
          -direction;

        break;
      }
    }
  }
}


function penalty(m){

  const n=m.length;

  let score=0;


  /* Long runs */

  for(let r=0;r<n;r++){

    let color=m[r][0];

    let run=1;


    for(let c=1;c<n;c++){

      if(
        m[r][c]===
        color
      )

        run++;

      else{

        if(run>=5)

          score+=
            3+
            run-5;

        color=
          m[r][c];

        run=1;
      }
    }


    if(run>=5)

      score+=
        3+
        run-5;
  }


  for(let c=0;c<n;c++){

    let color=
      m[0][c];

    let run=1;


    for(let r=1;r<n;r++){

      if(
        m[r][c]===
        color
      )

        run++;

      else{

        if(run>=5)

          score+=
            3+
            run-5;

        color=
          m[r][c];

        run=1;
      }
    }


    if(run>=5)

      score+=
        3+
        run-5;
  }


  /* 2x2 */

  for(let r=0;r<n-1;r++)

    for(let c=0;c<n-1;c++){

      const v=
        m[r][c];

      if(
        v===m[r+1][c]&&
        v===m[r][c+1]&&
        v===m[r+1][c+1]
      )

        score+=3;
    }


  /* Finder-like patterns */

  const pattern=
  [
    true,
    false,
    true,
    true,
    true,
    false,
    true
  ];


  function matches(a){

    for(let i=0;i<7;i++)

      if(
        a[i]!==
        pattern[i]
      )

        return false;

    return true;
  }


  for(let r=0;r<n;r++)

    for(let c=0;c<=n-7;c++){

      if(
        matches(
          m[r].slice(
            c,
            c+7
          )
        )
      ){

        let left=false;
        let right=false;


        if(c>=4)

          left=
            !m[r][c-1]&&
            !m[r][c-2]&&
            !m[r][c-3]&&
            !m[r][c-4];


        if(c+10<n)

          right=
            !m[r][c+7]&&
            !m[r][c+8]&&
            !m[r][c+9]&&
            !m[r][c+10];


        if(left||right)

          score+=40;
      }
    }


  for(let c=0;c<n;c++)

    for(let r=0;r<=n-7;r++){

      const a=[];

      for(let i=0;i<7;i++)
        a.push(
          m[r+i][c]
        );


      if(matches(a)){

        let top=false;
        let bottom=false;


        if(r>=4)

          top=
            !m[r-1][c]&&
            !m[r-2][c]&&
            !m[r-3][c]&&
            !m[r-4][c];


        if(r+10<n)

          bottom=
            !m[r+7][c]&&
            !m[r+8][c]&&
            !m[r+9][c]&&
            !m[r+10][c];


        if(top||bottom)

          score+=40;
      }
    }


  /* Dark/light balance */

  let dark=0;


  for(const row of m)

    for(const v of row)

      if(v)
        dark++;


  const pct=
    dark*100/
    (n*n);


  score+=
    Math.floor(
      Math.abs(
        pct-50
      )/5
    )*10;


  return score;
}


function create(text){

  const input=
    bytes(text);

  let version=0;


  for(let v=1;v<=10;v++){

    const cap=
      capacity(v)*8;

    const required=
      4+
      (v<=9?8:16)+
      input.length*8;


    if(required<=cap){

      version=v;

      break;
    }
  }


  if(!version)

    throw Error(
      "The generated URL is too large for the embedded QR encoder. Shorten the entered field values."
    );


  const data=
    codewords(
      text,
      version
    );


  let best=null;

  let bestScore=
    Infinity;


  for(let mask=0;mask<8;mask++){

    const m=
      setup(version);


    formatInfo(
      m,
      mask
    );


    placeData(
      m,
      data,
      mask
    );


    const score=
      penalty(m);


    if(
      score<
      bestScore
    ){

      best=m;

      bestScore=
        score;
    }
  }


  return{
    matrix:best,
    version
  };
}


function draw(
  canvas,
  text
){

  const qr=
    create(text);

  const m=
    qr.matrix;

  const modules=
    m.length;


  /*
    4 modules is the QR specification minimum quiet zone.
    We render 6 for improved phone-camera acquisition.
  */

  const quiet=6;


  /*
    Use fixed 10 physical canvas pixels per QR module.
    This creates a crisp high resolution source image.
  */

  const scale=10;


  const total=
    modules+
    quiet*2;


  canvas.width=
    total*scale;

  canvas.height=
    total*scale;


  /*
    CSS display size.
    Underlying PNG remains high resolution.
  */

  canvas.style.width=
    "300px";

  canvas.style.height=
    "300px";


  const ctx=
    canvas.getContext(
      "2d",
      {
        alpha:false
      }
    );


  ctx.imageSmoothingEnabled=
    false;


  ctx.fillStyle=
    "#ffffff";


  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );


  ctx.fillStyle=
    "#000000";


  for(
    let r=0;
    r<modules;
    r++
  )

    for(
      let c=0;
      c<modules;
      c++
    )

      if(m[r][c])

        ctx.fillRect(

          (c+quiet)*
          scale,

          (r+quiet)*
          scale,

          scale,
          scale

        );


  return{
    version:
      qr.version,

    modules
  };
}


return{
  create,
  draw
};

})();



/* ============================================================
   APPLICATION
============================================================ */

(()=>{

"use strict";


const $=
  id=>
  document.getElementById(id);


const installerView=
  $("installerView");

const userView=
  $("userView");

const form=
  $("configForm");

const formGrid=
  $("formGrid");

const status=
  $("status");

const history=
  $("history");

const historyEmpty=
  $("historyEmpty");

const clearHistory=
  $("clearHistory");

const userCard=
  $("userCard");



/* ============================================================
   BUILD CHANNELS 1-16
============================================================ */


for(
  let i=1;
  i<=16;
  i++
){

  const row=
    document.createElement(
      "div"
    );


  row.className=
    "form-row";


  row.innerHTML=

    `<label for="channel${i}">
       Channel ${i}
     </label>

     <div class="field">

       <input
       id="channel${i}"
       maxlength="80"
       placeholder="Gauge Factor, e.g. GF2.01">

     </div>`;


  formGrid.appendChild(
    row
  );
}



/* ============================================================
   HTML ESCAPE
============================================================ */


function esc(value){

  return String(
    value??""
  )

  .replace(
    /&/g,
    "&amp;"
  )

  .replace(
    /</g,
    "&lt;"
  )

  .replace(
    />/g,
    "&gt;"
  )

  .replace(
    /"/g,
    "&quot;"
  )

  .replace(
    /'/g,
    "&#039;"
  );
}



/* ============================================================
   PAYLOAD
============================================================ */


function collect(){

  const specimen=
    $("specimenId")
    .value
    .trim();


  if(!specimen)

    throw Error(
      "Specimen ID is required."
    );


  /*
    Short property names keep
    QR payload size low.

    s = specimen
    g = GTRS
    i = installer
    c = channels
  */


  const data={
    s:specimen
  };


  const g=
    $("gtrsNumber")
    .value
    .trim();


  const installer=
    $("installerName")
    .value
    .trim();


  if(g)
    data.g=g;


  if(installer)
    data.i=installer;


  const channels=[];


  for(
    let i=1;
    i<=16;
    i++
  ){

    const value=

      $(
        "channel"+i
      )

      .value
      .trim();


    /*
      Blank channels are
      completely stripped.
    */


    if(value)

      channels.push(
        [
          i,
          value
        ]
      );
  }


  if(
    channels.length
  )

    data.c=
      channels;


  return data;
}



/* ============================================================
   BASE64 URL ENCODING
============================================================ */


function encode(data){

  const json=
    JSON.stringify(
      data
    );


  const bytes=
    new TextEncoder()
    .encode(
      json
    );


  let binary="";


  for(
    const byte of bytes
  )

    binary+=
      String
      .fromCharCode(
        byte
      );


  return btoa(binary)

    .replace(
      /\+/g,
      "-"
    )

    .replace(
      /\//g,
      "_"
    )

    .replace(
      /=+$/g,
      ""
    );
}



function decode(encoded){

  let b64=
    encoded

    .replace(
      /-/g,
      "+"
    )

    .replace(
      /_/g,
      "/"
    );


  while(
    b64.length%4
  )

    b64+="=";


  const binary=
    atob(
      b64
    );


  const bytes=
    new Uint8Array(
      binary.length
    );


  for(
    let i=0;
    i<binary.length;
    i++
  )

    bytes[i]=
      binary
      .charCodeAt(
        i
      );


  return JSON.parse(

    new TextDecoder()
    .decode(
      bytes
    )

  );
}



/* ============================================================
   CREATE UNIQUE END USER URL
============================================================ */


function targetURL(encoded){

  const url=
    new URL(
      location.href
    );


  url.search=
    "";


  url.hash=
    "";


  url.searchParams.set(
    "d",
    encoded
  );


  return url.href;
}



/* ============================================================
   STATUS
============================================================ */


function setStatus(
  message,
  type=""
){

  status.textContent=
    message;


  status.className=
    "status "+type;
}



/* ============================================================
   DOWNLOAD QR PNG
============================================================ */


function downloadPNG(
  canvas,
  specimen
){

  const link=
    document.createElement(
      "a"
    );


  const safeName=

    specimen

    .replace(
      /[^a-z0-9_-]/gi,
      "_"
    );


  link.download=

    safeName+
    "_QR.png";


  link.href=

    canvas
    .toDataURL(
      "image/png"
    );


  link.click();
}



/* ============================================================
   HISTORY ENTRY
============================================================ */


function addHistory(
  payload,
  url
){

  historyEmpty
  .classList
  .add(
    "hidden"
  );


  clearHistory
  .classList
  .remove(
    "hidden"
  );


  const item=
    document.createElement(
      "article"
    );


  item.className=
    "history-item";


  const title=

    document.createElement(
      "div"
    );


  title.className=
    "history-title";


  const h3=

    document.createElement(
      "h3"
    );


  h3.textContent=
    payload.s;


  const badge=

    document.createElement(
      "span"
    );


  badge.className=
    "badge";


  const count=

    payload.c
    ?.length
    ||0;


  badge.textContent=

    count+
    " active channel"+
    (
      count===1
      ?""
      :"s"
    );


  title.append(
    h3,
    badge
  );



  const layout=

    document.createElement(
      "div"
    );


  layout.className=
    "qr-layout";



  const qrBox=

    document.createElement(
      "div"
    );


  qrBox.className=
    "qr-box";



  const canvas=

    document.createElement(
      "canvas"
    );


  qrBox.appendChild(
    canvas
  );



  const details=

    document.createElement(
      "div"
    );



  const urlBox=

    document.createElement(
      "div"
    );


  urlBox.className=
    "url-box";


  urlBox.textContent=
    url;



  const controls=

    document.createElement(
      "div"
    );


  controls.className=
    "actions";



  const copyBtn=

    document.createElement(
      "button"
    );


  copyBtn.className=
    "secondary";


  copyBtn.type=
    "button";


  copyBtn.textContent=
    "Copy Link";


  copyBtn.onclick=
    async()=>{

      try{

        await navigator
        .clipboard
        .writeText(
          url
        );


        copyBtn.textContent=
          "Copied";


        setTimeout(
          ()=>
          copyBtn.textContent=
            "Copy Link",
          1200
        );

      }catch{

        prompt(
          "Copy this URL:",
          url
        );
      }

    };



  const downloadBtn=

    document.createElement(
      "button"
    );


  downloadBtn.className=
    "secondary";


  downloadBtn.type=
    "button";


  downloadBtn.textContent=
    "Download QR PNG";


  downloadBtn.onclick=
    ()=>{

      downloadPNG(
        canvas,
        payload.s
      );

    };



  const openBtn=

    document.createElement(
      "a"
    );


  openBtn.className=
    "btn secondary";


  openBtn.textContent=
    "Test End User View";


  openBtn.href=
    url;


  openBtn.target=
    "_blank";


  openBtn.rel=
    "noopener";



  controls.append(
    copyBtn,
    downloadBtn,
    openBtn
  );



  const note=

    document.createElement(
      "p"
    );


  note.className=
    "muted";


  note.textContent=

    "Before printing labels, use 'Test End User View' to verify that the encoded configuration opens correctly.";



  details.append(
    urlBox,
    controls,
    note
  );


  layout.append(
    qrBox,
    details
  );


  item.append(
    title,
    layout
  );


  history.prepend(
    item
  );


  return QR.draw(
    canvas,
    url
  );
}



/* ============================================================
   GENERATE
============================================================ */


form.addEventListener(
  "submit",
  event=>{

    event.preventDefault();


    setStatus(
      ""
    );


    try{

      const payload=
        collect();


      const encoded=
        encode(
          payload
        );


      const url=
        targetURL(
          encoded
        );


      const info=
        addHistory(
          payload,
          url
        );


      setStatus(

        "QR code generated for "+
        payload.s+
        ". QR Version "+
        info.version+
        ".",

        "success"

      );


      /*
        Form is deliberately NOT reset.

        Batch history and installer
        values remain visible.
      */


    }catch(error){

      console.error(
        error
      );


      setStatus(

        error.message||
        "QR generation failed.",

        "error"

      );

    }

  }
);



/* ============================================================
   CLEAR SESSION HISTORY
============================================================ */


clearHistory.onclick=
()=>{

  history.innerHTML=
    "";


  historyEmpty
  .classList
  .remove(
    "hidden"
  );


  clearHistory
  .classList
  .add(
    "hidden"
  );


  setStatus(
    "Session history cleared."
  );
};



/* ============================================================
   VALIDATE END USER DATA
============================================================ */


function validate(
  data
){

  if(
    !data||
    typeof data!=="object"||
    Array.isArray(data)
  )

    throw Error(
      "Invalid configuration."
    );


  if(
    typeof data.s!=="string"||
    !data.s.trim()
  )

    throw Error(
      "Missing Specimen ID."
    );


  if(
    data.c!==undefined
  ){

    if(
      !Array.isArray(
        data.c
      )
    )

      throw Error(
        "Invalid channel configuration."
      );


    for(
      const row of data.c
    ){

      if(

        !Array.isArray(row)||

        row.length!==2||

        !Number.isInteger(
          row[0]
        )||

        row[0]<1||

        row[0]>16||

        typeof row[1]
        !=="string"

      )

        throw Error(
          "Invalid channel data."
        );
    }
  }


  return data;
}



/* ============================================================
   END USER TABLE
============================================================ */


function renderUser(
  data
){

  const metadata=[
    [
      "Specimen ID",
      data.s
    ],

    [
      "GTRS Number",
      data.g||""
    ],

    [
      "Installer Name",
      data.i||""
    ]
  ]

  .filter(
    row=>
    row[1]!==""
  );



  let html=

  `<div class="table-wrap">

    <table>

      <tbody>

      ${

        metadata

        .map(
          row=>

          `<tr>

            <th>
              ${esc(row[0])}
            </th>

            <td>
              ${esc(row[1])}
            </td>

          </tr>`

        )

        .join("")

      }

      </tbody>

    </table>

  </div>`;



  html+=

  `<div class="channel-section">

    <h2>
      Channel Configuration
    </h2>`;



  const channels=
    data.c||[];



  if(
    channels.length
  ){

    html+=

    `<div class="table-wrap">

      <table>

        <thead>

          <tr>

            <th>
              Channel
            </th>

            <th>
              Gauge Factor
            </th>

          </tr>

        </thead>

        <tbody>

        ${

          channels

          .map(
            row=>

            `<tr>

              <td>
                Channel
                ${esc(row[0])}
              </td>

              <td>
                ${esc(row[1])}
              </td>

            </tr>`

          )

          .join("")

        }

        </tbody>

      </table>

    </div>`;

  }else{

    html+=

    `<p class="empty">

      No channel Gauge Factor
      values were configured.

    </p>`;

  }



  html+=
    `</div>`;


  userCard.innerHTML=
    html;
}



/* ============================================================
   START APPLICATION
============================================================ */


function init(){

  const params=

    new URLSearchParams(
      location.search
    );


  const encoded=

    params.get(
      "d"
    );



  /*
    ?d= exists:
    End User View

    No ?d=:
    Installer View
  */


  if(encoded){

    installerView
    .classList
    .add(
      "hidden"
    );


    userView
    .classList
    .remove(
      "hidden"
    );


    try{

      const data=

        validate(

          decode(
            encoded
          )

        );


      renderUser(
        data
      );


      document.title=

        data.s+
        " - Specimen Configuration";


    }catch(error){

      console.error(
        error
      );


      userCard.innerHTML=

      `<div class="error-panel">

        <strong>
          Unable to open configuration.
        </strong>

        <br><br>

        The QR configuration data is
        missing, damaged or invalid.

      </div>`;

    }


  }else{


    userView
    .classList
    .add(
      "hidden"
    );


    installerView
    .classList
    .remove(
      "hidden"
    );

  }

}


init();

})();
</script>

</html>
